services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/data/cache:/app/data/cache
      - ./backend/models:/app/models
    environment:
      - CORS_ORIGINS=http://localhost:8080,http://127.0.0.1:8080,http://localhost

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_USE_BACKEND_CACHE: "true"
    ports:
      - "8080:80"
    depends_on:
      - backend
